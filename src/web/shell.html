<head>
    <meta charset="utf-8">
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
    <link href="shell.css" rel="stylesheet">
    <title>EchoMap</title>
</head>
<body>
<canvas id="canvas" tabindex="-1"></canvas>
<script>
    const canvas = document.getElementById("canvas");

    canvas.addEventListener("contextmenu", (event) => {
        event.preventDefault();
    });

    var Module = {
        canvas,

        print: text => console.log(text),
        printErr: text => console.error(text),
        setStatus: text => {
            if (text)
                console.log(text);
        }
    };

    Module.echomapOpenWAVFileChooserForExistingSignal = (() => {
        let input = null;

        return function openWavFilePicker(projectID, signalID) {
            if (!input) {
                input = document.createElement("input");
                input.type = "file";
                input.accept = ".wav,audio/wav,audio/x-wav";
                input.style.display = "none";

                document.body.appendChild(input);

                input.addEventListener("change", async () => {
                    const file = input.files && input.files[0];

                    input.value = "";

                    if (!file)
                        return;

                    try {
                        const bytes = new Uint8Array(await file.arrayBuffer());

                        const directory = "/uploads";
                        const safeName = file.name.replace(/[^a-zA-Z0-9._()+ -]/g, "_");
                        const path = `${directory}/${Date.now()}_${safeName}`;

                        try {
                            Module.FS.mkdirTree(directory);
                        } catch (_) {
                            try {
                                Module.FS.mkdir(directory);
                            } catch (_) {
                                // Already exists.
                            }
                        }

                        Module.FS.writeFile(path, bytes);

                        const result = Module.ccall(
                                "echomap_on_wav_file_picked_for_existing_signal",
                                "number",
                                ["number", "number", "string"],
                                [projectID, signalID, path]
                        );

                        if (result !== 0)
                            console.error(`echomap_on_wav_file_picked_for_existing_signal failed with code ${result}`);
                    } catch (error) {
                        console.error("Could not import WAV file:", error);
                    }
                });
            }

            if (input.showPicker)
                input.showPicker();
            else
                input.click();
        };
    })();

    // TODO: Obviously we need something more general for a proper solution!
    Module.echomapOpenProjectFileChooser = (() => {
        let input = null;

        return function openWavFilePicker() {
            if (!input) {
                input = document.createElement("input");
                input.type = "file";
                input.accept = ".json";
                input.style.display = "none";

                document.body.appendChild(input);

                input.addEventListener("change", async () => {
                    const file = input.files && input.files[0];

                    input.value = "";

                    if (!file)
                        return;

                    try {
                        const bytes = new Uint8Array(await file.arrayBuffer());

                        const directory = "/uploads";
                        const safeName = file.name.replace(/[^a-zA-Z0-9._()+ -]/g, "_");
                        const path = `${directory}/${Date.now()}_${safeName}`;

                        try {
                            Module.FS.mkdirTree(directory);
                        } catch (_) {
                            try {
                                Module.FS.mkdir(directory);
                            } catch (_) {
                                // Already exists.
                            }
                        }

                        Module.FS.writeFile(path, bytes);

                        const result = Module.ccall(
                                "echomap_on_project_file_picked",
                                "number",
                                ["string"],
                                [path]
                        );

                        if (result !== 0)
                            console.error(`echomap_on_project_file_picked failed with code ${result}`);
                    } catch (error) {
                        console.error("Could not import project file:", error);
                    }
                });
            }

            if (input.showPicker)
                input.showPicker();
            else
                input.click();
        };
    })();
</script>
